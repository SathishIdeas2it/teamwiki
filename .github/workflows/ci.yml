name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type-check, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: teamwiki_test
          POSTGRES_USER: teamwiki
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_TEST: postgresql://teamwiki:${{ secrets.TEST_DB_PASSWORD }}@localhost:5432/teamwiki_test
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      IMPORT_DIR: /tmp/teamwiki-imports
      IMPORT_POLL_INTERVAL_MS: '60000'
      NODE_ENV: test
      LOG_LEVEL: error

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src tests --max-warnings 0

      - name: Format check
        run: npx prettier --check "src/**/*.{ts,tsx}" "tests/**/*.{ts,tsx}"

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Create import directory
        run: mkdir -p /tmp/teamwiki-imports/failed

      - name: Run migrations (test DB)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_TEST }}

      - name: Unit tests
        run: npx jest --config jest.config.ts --coverage --ci

      - name: Integration tests
        run: npx jest --config jest.integration.config.ts --ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: http://localhost:3000
          IMPORT_DIR: /tmp/teamwiki-imports

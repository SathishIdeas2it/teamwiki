version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
      testing:
        patterns:
          - '@playwright/*'
          - '@testing-library/*'
          - 'jest*'
          - 'ts-jest'
          - '@jest/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
